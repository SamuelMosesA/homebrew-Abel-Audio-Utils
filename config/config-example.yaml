# Behringer Audio Recorder Configuration (Example)

# Server settings
# The port the web server will listen on.
port: "8080"
# Admin users file
admin_user_credentials: "./admin_user_credentials.json"

# Audio settings
# The sample rate for recording and playback.
sample_rate: 48000
# The size of the audio buffer.
buffer_size: 1024

# Default Routing & Gain
# Default left input channel index (0-indexed).
default_ch_l: 1
# Default right input channel index (0-indexed).
default_ch_r: 0
# Default digital gain boost multiplier.
default_boost: 1.0

# Storage settings
# Local directory where .wav files will be saved.
storage_location: "./recordings"
# Target directory for the "Push to Cloud" feature.
cloud_drive_location: "./cloud_drive"

# AI Provider (gemini or openai)
ai_provider: "gemini"

# Translation (Gemini)
# gemini_api_key: "YOUR_API_KEY_HERE"
gemini_model: "models/gemini-2.5-flash-native-audio-preview-12-2025"
gemini_voice: "Zephyr"
gemini_audio_in_buffer_size: 100
gemini_audio_out_buffer_size: 1000
gemini_subtitle_buffer_size: 100

# Translation (OpenAI)
# openai_api_key: "YOUR_API_KEY_HERE"
openai_translate_model: "gpt-realtime-translate"
openai_transcribe_model: "gpt-realtime-whisper"
openai_voice: "alloy"

# AI Language Settings
ai_original_language: "English"
ai_languages:
  - { code: "en", name: "English" }
  - { code: "nl", name: "Dutch" }
  - { code: "pt", name: "Portuguese" }
  - { code: "es", name: "Spanish" }
  - { code: "fr", name: "French" }
  - { code: "ru", name: "Russian" }

# Telemetry settings (OpenTelemetry OTLP gateway endpoint)
otlp_endpoint: "http://localhost:4318"

